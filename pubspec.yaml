name: boardpocket
description: "BoardPocket - Digital Collection & Randomizer for Board Games"
publish_to: 'none'

version: 0.1.4+11

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2

  # Database
  sqflite: ^2.4.2
  sqflite_common_ffi_web: ^1.1.1
  path: ^1.9.1

  # Storage & Files
  path_provider: ^2.1.5
  image_picker: ^1.2.1
  file_picker: ^10.3.10
  share_plus: ^12.0.1
  permission_handler: ^12.0.1

  # Navigation
  go_router: ^17.1.0

  # State Management
  provider: ^6.1.5

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.3
  collection: ^1.19.1
  shared_preferences: ^2.5.4
  device_info_plus: ^12.3.0
  url_launcher: ^6.3.2

  # Charts
  fl_chart: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  coverage: ^1.15.0

flutter:
  uses-material-design: true

  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/ic_launcher.png"
  adaptive_icon_background: "#FFFFFF"
  #adaptive_icon_foreground: "assets/icon/ic_launcher_foreground.png"
  min_sdk_android: 21
